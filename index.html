<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agricovet de Guatemala - Inventario</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 0; padding: 15px; text-align: center; color: #333; }
        .logo-container { margin-bottom: 20px; }
        .logo-container img { max-width: 150px; height: auto; }
        .contenedor { max-width: 100%; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); box-sizing: border-box; }
        .inventario-container { max-width: 100%; margin: 0 auto; background: white; padding: 15px; border-radius: 10px; display: none; box-sizing: border-box; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #2c5e3b; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 10px; font-weight: bold; }
        button:hover { background-color: #1e4229; }
        .btn-accion { width: auto; padding: 8px 12px; font-size: 14px; margin: 2px; display: inline-block; }
        .btn-quitar { background-color: #d9534f; }
        .link { color: #2c5e3b; cursor: pointer; text-decoration: underline; margin-top: 15px; display: block; font-size: 14px; }
        .error { color: red; font-size: 14px; display: none; margin-top: 10px; }
        .exito { color: green; font-size: 14px; display: none; margin-top: 10px; }
        .advertencia { color: orange; font-size: 14px; display: none; margin-top: 10px; }
        #buscador { margin-bottom: 15px; border: 2px solid #2c5e3b; }
        .tabla-responsive { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; min-width: 450px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; font-size: 14px; vertical-align: middle; }
        th { background-color: #e0ca9e; color: #333; }
        .img-producto { width: 60px; height: 60px; object-fit: cover; border-radius: 5px; border: 1px solid #ccc; background-color: #f0f0f0; }
        .header-inv { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; align-items: center; }
        .btn-salir { background-color: #666; width: 100%; }
        #panel-admin { background: #e8f5e9; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #c8e6c9; }
        #panel-admin h3 { margin-top: 0; color: #2c5e3b; font-size: 16px; }
        .requisitos { font-size: 12px; color: #666; margin-top: 8px; text-align: left; }
        .requisito { margin: 4px 0; }
        .requisito.cumplido { color: green; }
        .requisito.incumplido { color: red; }
        .codigo-verif { background-color: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid #ddd; margin-top: 15px; }
    </style>
</head>
<body>
    <script>
        const CORREO_ADMIN = "seseffff942@gmail.com";
        const listaOficial = ["Legatus mixx 30 OD litro", "Leñador 16 EW galón", /* ...resto de tu lista... */];

        let usuariosDB = JSON.parse(localStorage.getItem('usuarios_agricovet_v2')) || {};
        let inventarioDB = JSON.parse(localStorage.getItem('inventario_agricovet_oficial'));
        
        let codigoEnviadoActual = null;
        let correoEnVerificacion = null;
        let contrasenaEnVerificacion = null;
        let intentosFallidos = 0;

        if (!inventarioDB || inventarioDB.length === 0) {
            inventarioDB = listaOficial.map(nombre => ({ nombre: nombre, stock: 0, foto: nombre + ".PNG" }));
            localStorage.setItem('inventario_agricovet_oficial', JSON.stringify(inventarioDB));
        }

        // --- Funciones de inicio de sesión ---
        function iniciarSesion() {
            let correo = document.getElementById('login-correo').value.toLowerCase().trim();
            let pass = document.getElementById('login-pass').value;
            
            if (usuariosDB[correo] && usuariosDB[correo].password === pass) {
                document.getElementById('panel-login').style.display = 'none';
                document.getElementById('panel-inventario').style.display = 'block';
                document.getElementById('usuario-activo').innerText = correo;
                if (correo === CORREO_ADMIN) document.getElementById('panel-admin').style.display = 'block';
                renderizarTabla();
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        function cerrarSesion() { location.reload(); }

        // --- Funciones de registro y verificación ---
        function reenviarCodigo() {
            if (!correoEnVerificacion) return;
            codigoEnviadoActual = generarCodigoVerificacion();
            intentosFallidos = 0;
            document.getElementById('codigo-verif').value = "";
            document.getElementById('contador-reintentos').innerText = "Reintentos: 3/3";
            enviarEmailVerificacion(correoEnVerificacion, codigoEnviadoActual);
        }

        // ... (resto de tus funciones: enviarCodigoVerificacion, verificarCodigo, etc.)
    </script>
</body>
</html>
